name: smart_pos
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Icons & UI
  cupertino_icons: ^1.0.8
  
  # Database & Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  sqflite: ^2.4.2
  path_provider: ^2.1.2
  path: ^1.9.1
  
  # State Management
  provider: ^6.1.1
  
  # Connectivity & Sync
  connectivity_plus: ^6.1.1
  
  # Backup (Google Drive)
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  
  # Utility
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

# Icon settings
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true

  # Assets section theek kar di gayi hai
  assets:
  - assets/images/icon.png